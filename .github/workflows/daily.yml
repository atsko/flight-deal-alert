name: daily-scan

on:
  schedule:
    - cron: '0 22 * * *' # 22:00 UTC = 翌朝 7:00 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scan flight prices
        run: node src/index.js
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
          AMADEUS_ENV: ${{ vars.AMADEUS_ENV || 'production' }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

      - name: Commit price history
        run: |
          git config user.name "flight-deal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "chore: price snapshot $(date -u +%F)"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
